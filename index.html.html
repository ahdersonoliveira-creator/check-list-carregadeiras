<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">
    <title>Checklist de Carregadeiras</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-family: 'Inter', sans-serif;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
        }

        body {
            background: linear-gradient(to bottom right, #f0f9ff, #e0e7ff);
            color: #1f2937;
            line-height: 1.6;
        }

        .container {
            max-width: 56rem;
            margin: 0 auto;
            padding: 1rem;
        }

        @media (min-width: 768px) {
            .container {
                padding: 1.5rem;
            }
        }

        @media (min-width: 1024px) {
            .container {
                padding: 2rem;
            }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header-icon {
            width: 3rem;
            height: 3rem;
            background: linear-gradient(to bottom right, #2563eb, #4f46e5);
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 1rem;
        }

        .header h1 {
            font-size: 1.875rem;
            margin-bottom: 0.5rem;
            color: #111827;
        }

        @media (min-width: 768px) {
            .header h1 {
                font-size: 2.25rem;
            }
        }

        .header p {
            color: #4b5563;
        }

        /* Tabs */
        .tabs {
            margin-bottom: 1.5rem;
        }

        .tab-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        @media (min-width: 640px) {
            .tab-list {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .tab-button {
            padding: 0.75rem 1rem;
            border: none;
            background: white;
            color: #6b7280;
            font-weight: 500;
            cursor: pointer;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
            font-size: 0.875rem;
        }

        .tab-button:hover {
            background: #f3f4f6;
        }

        .tab-button.active {
            background: linear-gradient(to right, #2563eb, #4f46e5);
            color: white;
        }

        /* Card */
        .card {
            background: white;
            border-radius: 0.65rem;
            border: 1px solid #e5e7eb;
            overflow: hidden;
        }

        .card-header {
            padding: 1.5rem;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h2 {
            font-size: 1.125rem;
            color: #111827;
        }

        .card-content {
            padding: 1.5rem;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 1rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        @media (min-width: 768px) {
            .form-row {
                grid-template-columns: 1fr 1fr;
            }
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #374151;
            font-size: 0.875rem;
        }

        input[type="text"],
        input[type="date"],
        input[type="time"],
        textarea,
        select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        input[type="time"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Buttons */
        .button {
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-height: 44px;
        }

        .button-primary {
            background: linear-gradient(to right, #2563eb, #4f46e5);
            color: white;
        }

        .button-primary:hover {
            opacity: 0.9;
        }

        .button-outline {
            background: white;
            color: #374151;
            border: 1px solid #d1d5db;
        }

        .button-outline:hover {
            background: #f9fafb;
        }

        .button-danger {
            background: white;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .button-danger:hover {
            background: #fef2f2;
        }

        .button-success {
            background: #16a34a;
            color: white;
        }

        .button-success:hover {
            opacity: 0.9;
        }

        .button-full {
            width: 100%;
        }

        /* Falhas */
        .falha-item {
            padding: 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            transition: background-color 0.3s ease;
        }

        .falha-item:hover {
            background-color: #f9fafb;
        }

        .falha-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .falha-header h3 {
            font-size: 1rem;
            color: #111827;
        }

        /* Checklist */
        .checklist-container {
            max-height: 24rem;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .checklist-item {
            padding: 0.75rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            transition: background-color 0.3s ease;
        }

        .checklist-item:hover {
            background-color: #f9fafb;
        }

        .checklist-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .checklist-item-label {
            font-weight: 500;
            font-size: 0.875rem;
            flex: 1;
            min-width: 200px;
        }

        .checklist-item-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .checklist-item-buttons button {
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            min-width: 100px;
        }

        /* Resumo */
        .summary-box {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .summary-box h3 {
            color: #1e3a8a;
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        .summary-box ul {
            list-style: none;
            color: #1e40af;
            font-size: 0.875rem;
        }

        .summary-box li {
            margin-bottom: 0.25rem;
        }

        /* Button Grid */
        .button-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        @media (min-width: 768px) {
            .button-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Tab Content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Scrollbar */
        .checklist-container::-webkit-scrollbar {
            width: 0.5rem;
        }

        .checklist-container::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 0.25rem;
        }

        .checklist-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 0.25rem;
        }

        .checklist-container::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Mobile optimizations */
        @media (max-width: 640px) {
            body {
                -webkit-user-select: none;
                user-select: none;
            }

            input, textarea, select {
                -webkit-user-select: text;
                user-select: text;
                font-size: 16px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .container {
                padding: 0.75rem;
            }

            .card-header {
                padding: 1rem;
            }

            .card-content {
                padding: 1rem;
            }
        }

        button {
            touch-action: manipulation;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            background: white;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        .toast.success {
            border-left: 4px solid #16a34a;
            color: #15803d;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }

        @media (max-width: 640px) {
            .toast {
                bottom: 1rem;
                right: 0.5rem;
                left: 0.5rem;
                width: auto;
            }
        }

        .toast.hide {
            animation: slideOut 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-icon">🚜</div>
            <h1>Checklist de Carregadeiras</h1>
            <p>Preencha o formulário abaixo e envie pelo WhatsApp</p>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab-list">
                <button class="tab-button active" onclick="switchTab(event, 'dados')">Dados</button>
                <button class="tab-button" onclick="switchTab(event, 'falhas')">Falhas</button>
                <button class="tab-button" onclick="switchTab(event, 'checklist')">Checklist</button>
                <button class="tab-button" onclick="switchTab(event, 'resumo')">Resumo</button>
            </div>

            <!-- TAB: DADOS BÁSICOS -->
            <div id="dados" class="tab-content active">
                <div class="card">
                    <div class="card-header">
                        <h2>Dados Básicos</h2>
                    </div>
                    <div class="card-content">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="data">Data</label>
                                <input type="date" id="data">
                            </div>
                            <div class="form-group">
                                <label for="turno">Turno</label>
                                <input type="text" id="turno" placeholder="Ex: Manhã, Tarde, Noite">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="operador">Operador</label>
                            <input type="text" id="operador" placeholder="Nome do operador">
                        </div>

                        <div class="form-group">
                            <label for="maquina">Máquina</label>
                            <input type="text" id="maquina" placeholder="Modelo/Número da máquina">
                        </div>

                        <div class="form-group">
                            <label for="local">Local</label>
                            <input type="text" id="local" placeholder="Local de operação">
                        </div>
                    </div>
                </div>
            </div>

            <!-- TAB: FALHAS -->
            <div id="falhas" class="tab-content">
                <div id="falhas-container"></div>
                <button class="button button-outline button-full" onclick="addFalha()">+ Adicionar Falha</button>
            </div>

            <!-- TAB: CHECKLIST -->
            <div id="checklist" class="tab-content">
                <div class="card">
                    <div class="card-header">
                        <h2>Checklist de Verificação</h2>
                    </div>
                    <div class="card-content">
                        <div class="checklist-container" id="checklist-container"></div>
                    </div>
                </div>
            </div>

            <!-- TAB: RESUMO -->
            <div id="resumo" class="tab-content">
                <div class="card">
                    <div class="card-header">
                        <h2>Observações e Pedidos</h2>
                    </div>
                    <div class="card-content">
                        <div class="form-group">
                            <label for="observacoes">Observações</label>
                            <textarea id="observacoes" placeholder="Adicione observações gerais..."></textarea>
                        </div>

                        <div class="form-group">
                            <label for="pedidos">Pedidos</label>
                            <textarea id="pedidos" placeholder="Liste os pedidos/solicitações..."></textarea>
                        </div>

                        <div class="summary-box">
                            <h3>Resumo do Preenchimento</h3>
                            <ul>
                                <li>✓ Dados básicos: <span id="summary-dados">Incompleto</span></li>
                                <li>✓ Falhas registradas: <span id="summary-falhas">0</span></li>
                                <li>✓ Itens verificados: <span id="summary-checklist">0</span>/36</li>
                            </ul>
                        </div>

                        <div class="button-grid">
                            <button class="button button-outline button-full" onclick="copyReport()">📋 Copiar</button>
                            <button class="button button-outline button-full" onclick="downloadReport()">⬇️ Baixar</button>
                            <button class="button button-success button-full" onclick="sendWhatsApp()">📱 WhatsApp</button>
                        </div>

                        <div class="button-grid" style="margin-top: 1rem;">
                            <button class="button button-outline button-full" onclick="downloadPDF()">📄 Baixar PDF</button>
                            <button class="button button-success button-full" style="grid-column: span 2;" onclick="sendPDFWhatsApp()">📱 Enviar PDF WhatsApp</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CHECKLIST_ITEMS = [
            "VERIFICAR NÍVEL DO ÓLEO",
            "FILTRO DE AR DO MOTOR (CONDIÇÃO E LIMPEZA)",
            "VERIFICAR CONDIÇÃO DAS CORREIAS DO ALTERNADOR A/C",
            "NÍVEL DO LIQUIDO ARREFECEDOR",
            "FILTRO SEPARADOR DE COMBUSTÍVEL (DRENAR SE NECESSÁRIO)",
            "CONDIÇÃO DE LIMPEZA DOS RADIADORES",
            "CONDIÇÃO DE LIMPEZA DO CONDENSADOR DO AR CONDICIONADO",
            "VAZAMENTO NO MOTOR",
            "VERIFICAR NÍVEL DO ÓLEO HIDRÁULICO",
            "VERIFICAR CONDIÇÕES DAS MANGUEIRAS HIDRÁULICAS",
            "VERIFICAR AS CONDIÇÕES DOS CILINDROS HIDRÁULICOS",
            "LUBRIFICAÇÃO DOS PINOS DE ARTICULAÇÃO",
            "LUBRIFICAÇÃO DO CARDAN",
            "CAÇAMBA - LÂMINA – DENTES",
            "BORDAS CORTANTES",
            "VERIFICAR FOLGAS EM PONTOS DE ARTICULAÇÃO (CONCHA, MEIO, CILINDROS E CRUZETAS)",
            "VAZAMENTOS NO SISTEMA HIDRÁULICO",
            "LIMPEZA DA CABINE",
            "RETROVISORES",
            "FUNCIONAMENTO DO AR CONDICIONADO",
            "FARÓIS DE SERVIÇO E SINALIZAÇÃO",
            "FALHAS ATIVAS NO PAINEL",
            "VERIFICAR FILTRO HIDRÁULICOS",
            "MANUTENÇÕES PREVENTIVAS",
            "LIMPADOR DO PARA-BRISA",
            "CINTO DE SEGURANÇA",
            "FILTRO DO AR CONDICIONADO (INTERNO E EXTERNO)",
            "FREIO / ACELERADOR",
            "BUZINA",
            "ALAVANCA DO EQUIPAMENTO DE TRABALHO",
            "VIDROS",
            "TAMPAS DE COMPARTIMENTO DO MOTOR",
            "CONTRA PESO",
            "ESCADAS LATERAIS",
            "BATERIAS",
            "ALARME DE RÉ"
        ];

        let falhas = [{ horaInicial: "", horaFinal: "", descricao: "" }];
        let checklist = CHECKLIST_ITEMS.map((nome, idx) => ({
            id: idx + 1,
            nome,
            status: null,
            observacao: ""
        }));

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadDataFromStorage();
            renderFalhas();
            renderChecklist();
            updateSummary();
            document.addEventListener('change', saveDataToStorage);
            document.addEventListener('input', saveDataToStorage);
        });

        // LocalStorage functions for data persistence
        function saveDataToStorage() {
            try {
                const data = {
                    data: document.getElementById('data').value,
                    operador: document.getElementById('operador').value,
                    maquina: document.getElementById('maquina').value,
                    turno: document.getElementById('turno').value,
                    local: document.getElementById('local').value,
                    observacoes: document.getElementById('observacoes').value,
                    pedidos: document.getElementById('pedidos').value,
                    falhas: falhas,
                    checklist: checklist
                };
                localStorage.setItem('checklistData', JSON.stringify(data));
            } catch (e) {
                console.log('Erro ao salvar dados:', e);
            }
        }

        function loadDataFromStorage() {
            try {
                const saved = localStorage.getItem('checklistData');
                if (saved) {
                    const data = JSON.parse(saved);
                    if (data.data) document.getElementById('data').value = data.data;
                    if (data.operador) document.getElementById('operador').value = data.operador;
                    if (data.maquina) document.getElementById('maquina').value = data.maquina;
                    if (data.turno) document.getElementById('turno').value = data.turno;
                    if (data.local) document.getElementById('local').value = data.local;
                    if (data.observacoes) document.getElementById('observacoes').value = data.observacoes;
                    if (data.pedidos) document.getElementById('pedidos').value = data.pedidos;
                    if (data.falhas) falhas = data.falhas;
                    if (data.checklist) {
                        const oldChecklist = data.checklist;
                        checklist = CHECKLIST_ITEMS.map((nome, idx) => {
                            const oldItem = oldChecklist.find(i => i.nome === nome);
                            return {
                                id: idx + 1,
                                nome,
                                status: oldItem ? oldItem.status : null,
                                observacao: oldItem ? oldItem.observacao : ""
                            };
                        });
                    }
                }
            } catch (e) {
                console.log('Erro ao carregar dados:', e);
            }
        }

        // Navigation
        function switchTab(event, tabId) {
            const tabs = document.querySelectorAll('.tab-content');
            const buttons = document.querySelectorAll('.tab-button');
            
            tabs.forEach(tab => tab.classList.remove('active'));
            buttons.forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
            
            if (tabId === 'resumo') updateSummary();
        }

        // Falhas Logic
        function addFalha() {
            falhas.push({ horaInicial: "", horaFinal: "", descricao: "" });
            renderFalhas();
            saveDataToStorage();
        }

        function removeFalha(index) {
            falhas.splice(index, 1);
            if (falhas.length === 0) falhas.push({ horaInicial: "", horaFinal: "", descricao: "" });
            renderFalhas();
            saveDataToStorage();
        }

        function updateFalha(index, field, value) {
            falhas[index][field] = value;
            saveDataToStorage();
        }

        function renderFalhas() {
            const container = document.getElementById('falhas-container');
            container.innerHTML = '';
            
            falhas.forEach((falha, index) => {
                const div = document.createElement('div');
                div.className = 'falha-item card';
                div.innerHTML = `
                    <div class="falha-header">
                        <h3>Falha ${index + 1}</h3>
                        <button class="button button-danger" onclick="removeFalha(${index})">Remover</button>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Hora Inicial</label>
                            <input type="time" value="${falha.horaInicial}" onchange="updateFalha(${index}, 'horaInicial', this.value)">
                        </div>
                        <div class="form-group">
                            <label>Hora Final</label>
                            <input type="time" value="${falha.horaFinal}" onchange="updateFalha(${index}, 'horaFinal', this.value)">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Descrição da Falha</label>
                        <textarea placeholder="Descreva a falha..." oninput="updateFalha(${index}, 'descricao', this.value)">${falha.descricao}</textarea>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Checklist Logic
        function renderChecklist() {
            const container = document.getElementById('checklist-container');
            container.innerHTML = '';
            
            checklist.forEach(item => {
                const div = document.createElement('div');
                div.className = 'checklist-item';
                div.innerHTML = `
                    <div class="checklist-item-header">
                        <span class="checklist-item-label">${item.id}. ${item.nome}</span>
                        <div class="checklist-item-buttons">
                            <button class="button ${item.status === 'ok' ? 'button-success' : 'button-outline'}" 
                                onclick="updateChecklistStatus(${item.id}, 'ok')">OK</button>
                            <button class="button ${item.status === 'nok' ? 'button-danger' : 'button-outline'}" 
                                onclick="updateChecklistStatus(${item.id}, 'nok')">NÃO OK</button>
                        </div>
                    </div>
                    <div class="form-group" style="margin-top: 0.5rem;">
                        <input type="text" placeholder="Observação opcional..." 
                            value="${item.observacao}" 
                            oninput="updateChecklistObs(${item.id}, this.value)">
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function updateChecklistStatus(id, status) {
            const item = checklist.find(i => i.id === id);
            if (item) {
                item.status = item.status === status ? null : status;
                renderChecklist();
                updateSummary();
                saveDataToStorage();
            }
        }

        function updateChecklistObs(id, value) {
            const item = checklist.find(i => i.id === id);
            if (item) {
                item.observacao = value;
                saveDataToStorage();
            }
        }

        // Summary
        function updateSummary() {
            const data = document.getElementById('data').value;
            const operador = document.getElementById('operador').value;
            const maquina = document.getElementById('maquina').value;
            document.getElementById('summary-dados').textContent = (data && operador && maquina) ? 'Completo' : 'Incompleto';
            document.getElementById('summary-falhas').textContent = falhas.filter(f => f.descricao).length;
            document.getElementById('summary-checklist').textContent = checklist.filter(c => c.status).length;
        }

        // WhatsApp Report Generation
        function generateWhatsAppReport() {
            const data = document.getElementById('data').value || '[Não preenchido]';
            const operador = document.getElementById('operador').value || '[Não preenchido]';
            const maquina = document.getElementById('maquina').value || '[Não preenchido]';
            const turno = document.getElementById('turno').value || '[Não preenchido]';
            const local = document.getElementById('local').value || '[Não preenchido]';
            const observacoes = document.getElementById('observacoes').value;
            const pedidos = document.getElementById('pedidos').value;

            let report = '';
            report += '📋 RELATÓRIO DE FALHA E CHECKLIST - CARREGADEIRAS\n';
            report += '🔹 DADOS BÁSICOS\n';
            report += 'Data: ' + data + '\n';
            report += 'Operador: ' + operador + '\n';
            report += 'Máquina: ' + maquina + '\n';
            report += 'Turno: ' + turno + '\n';
            report += 'Local: ' + local + '\n\n';

            report += '⚠️ FALHAS REGISTRADAS\n';
            const falhasComDescricao = falhas.filter(f => f.descricao);
            if (falhasComDescricao.length > 0) {
                falhasComDescricao.forEach((falha, idx) => {
                    report += 'Falha ' + (idx + 1) + ': ' + falha.descricao + '\n';
                    if (falha.horaInicial || falha.horaFinal) {
                        report += '  Horário: ' + (falha.horaInicial || 'N/I') + ' às ' + (falha.horaFinal || 'N/I') + '\n';
                    }
                });
            } else {
                report += 'Nenhuma falha registrada\n';
            }
            report += '\n';

            report += '✅ CHECKLIST (' + checklist.length + ' ITENS)\n';
            
            let okCount = 0;
            let nokCount = 0;
            let naoVerificadoCount = 0;
            
            checklist.forEach(item => {
                let statusIcon = '';
                let statusText = '';
                
                if (item.status === 'ok') {
                    statusIcon = '✅';
                    statusText = 'OK';
                    okCount++;
                } else if (item.status === 'nok') {
                    statusIcon = '❌';
                    statusText = 'NÃO OK';
                    nokCount++;
                } else {
                    statusIcon = '⚪';
                    statusText = '';
                    naoVerificadoCount++;
                }
                
                report += item.id + '. ' + item.nome + ': ' + statusIcon;
                if (statusText) {
                    report += ' ' + statusText;
                }
                if (item.observacao) {
                    report += '\n   Obs: ' + item.observacao;
                }
                report += '\n';
            });
            
            report += '\n📊 RESUMO\n';
            report += '✅ OK: ' + okCount + '\n';
            report += '❌ NÃO OK: ' + nokCount + '\n';
            report += '⚪ NÃO VERIFICADO: ' + naoVerificadoCount + '\n\n';

            if (observacoes) {
                report += '📝 OBSERVAÇÕES\n' + observacoes + '\n\n';
            }

            if (pedidos) {
                report += '📦 PEDIDOS/SOLICITAÇÕES\n' + pedidos + '\n\n';
            }

            report += '_Gerado em: ' + new Date().toLocaleString('pt-BR') + '_';
            
            return report;
        }

        async function copyReport() {
            const report = generateWhatsAppReport();
            try {
                await navigator.clipboard.writeText(report);
                showToast('Relatório formatado copiado para a área de transferência!');
            } catch (err) {
                const textArea = document.createElement("textarea");
                textArea.value = report;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showToast('Relatório copiado!');
            }
        }

        function downloadReport() {
            const report = generateWhatsAppReport();
            const data = document.getElementById('data').value || 'checklist';
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(report));
            element.setAttribute('download', `checklist-carregadeiras-${data}.txt`);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
            showToast('Relatório baixado com sucesso!');
        }

        function sendWhatsApp() {
            const report = generateWhatsAppReport();
            const encodedReport = encodeURIComponent(report);
            showToast('Abrindo WhatsApp...');
            setTimeout(() => {
                const whatsappUrl = `https://wa.me/?text=${encodedReport}`;
                window.open(whatsappUrl, '_blank');
            }, 1000);
        }

        function showToast(message) {
            const existingToasts = document.querySelectorAll(".toast");
            if (existingToasts.length > 0) existingToasts.forEach(t => t.remove());
            const toast = document.createElement('div');
            toast.className = 'toast success';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // NOVO GERADOR DE PDF - SUPORTA MÚLTIPLAS PÁGINAS
        function generatePDFContent() {
            const data = document.getElementById('data').value || '[Não preenchido]';
            const operador = document.getElementById('operador').value || '[Não preenchido]';
            const maquina = document.getElementById('maquina').value || '[Não preenchido]';
            const turno = document.getElementById('turno').value || '[Não preenchido]';
            const local = document.getElementById('local').value || '[Não preenchido]';
            const observacoes = document.getElementById('observacoes').value;
            const pedidos = document.getElementById('pedidos').value;

            let html = `
                <div style="font-family: 'Inter', Arial, sans-serif; padding: 10px; color: #1f2937; max-width: 800px; margin: auto;">
                    
                    <!-- CABEÇALHO - PÁGINA 1 -->
                    <div style="border-bottom: 4px solid #2563eb; padding-bottom: 20px; margin-bottom: 25px; text-align: center;">
                        <h1 style="color: #2563eb; margin: 0; font-size: 26px; text-transform: uppercase; letter-spacing: 1px;">Relatório de Inspeção Diária</h1>
                        <p style="color: #6b7280; margin: 8px 0 0 0; font-size: 14px; font-weight: 500;">Equipamento: Carregadeira</p>
                    </div>

                    <!-- BLOCO DE DADOS -->
                    <div style="background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 20px; margin-bottom: 25px;">
                        <h3 style="color: #1e40af; margin: 0 0 15px 0; font-size: 16px; border-bottom: 1px solid #bfdbfe; padding-bottom: 8px;">DADOS DA OPERAÇÃO</h3>
                        <table style="width: 100%; font-size: 13px; border-collapse: collapse;">
                            <tr>
                                <td style="padding: 6px 0; width: 50%;"><strong>Data:</strong> ${data}</td>
                                <td style="padding: 6px 0;"><strong>Turno:</strong> ${turno}</td>
                            </tr>
                            <tr>
                                <td style="padding: 6px 0;"><strong>Operador:</strong> ${operador}</td>
                                <td style="padding: 6px 0;"><strong>Local:</strong> ${local}</td>
                            </tr>
                            <tr>
                                <td style="padding: 6px 0;"><strong>Máquina:</strong> ${maquina}</td>
                                <td style="padding: 6px 0;"><strong>Status:</strong> Ativo</td>
                            </tr>
                        </table>
                    </div>

                    <!-- BLOCO DE FALHAS -->
                    <div style="margin-bottom: 25px;">
                        <h3 style="color: #dc2626; border-left: 5px solid #dc2626; padding-left: 12px; margin: 0 0 15px 0; font-size: 16px; text-transform: uppercase;">Falhas Registradas</h3>
            `;

            const falhasComDescricao = falhas.filter(f => f.descricao);
            if (falhasComDescricao.length > 0) {
                falhasComDescricao.forEach((falha, idx) => {
                    html += `
                        <div style="margin-bottom: 12px; padding: 15px; background-color: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; page-break-inside: avoid;">
                            <p style="margin: 0; font-size: 13px; color: #991b1b;"><strong>FALHA ${idx + 1}</strong> | <strong>HORÁRIO:</strong> ${falha.horaInicial || 'N/I'} às ${falha.horaFinal || 'N/I'}</p>
                            <p style="margin: 8px 0 0 0; font-size: 12px; color: #4b5563; line-height: 1.5;"><strong>DESCRIÇÃO:</strong> ${falha.descricao}</p>
                        </div>
                    `;
                });
            } else {
                html += `<p style="margin: 0; font-size: 13px; color: #16a34a; font-style: italic;">✓ Nenhuma falha mecânica ou operacional registrada durante o turno.</p>`;
            }
            html += `</div>`;

            // BLOCO CHECKLIST - FORÇAR QUEBRA SE NECESSÁRIO
            html += `
                <div style="page-break-before: auto; margin-top: 30px;">
                    <h3 style="color: #1e40af; border-left: 5px solid #1e40af; padding-left: 12px; margin: 0 0 15px 0; font-size: 16px; text-transform: uppercase;">Checklist de Verificação (36 Itens)</h3>
                    <table style="width: 100%; font-size: 11px; border-collapse: collapse; border: 1px solid #e2e8f0;">
                        <thead>
                            <tr style="background-color: #f1f5f9; color: #334155;">
                                <th style="padding: 10px; border: 1px solid #e2e8f0; text-align: center; width: 8%;">Status</th>
                                <th style="padding: 10px; border: 1px solid #e2e8f0; text-align: left;">Item de Verificação</th>
                                <th style="padding: 10px; border: 1px solid #e2e8f0; text-align: center; width: 15%;">Resultado</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            let okCount = 0;
            let nokCount = 0;
            let naoVerificadoCount = 0;

            checklist.forEach(item => {
                let statusIcon = '⚪';
                let statusColor = '#64748b';
                let statusText = 'N/V';
                let bgColor = '#ffffff';

                if (item.status === 'ok') {
                    statusIcon = '✓';
                    statusColor = '#16a34a';
                    statusText = 'OK';
                    okCount++;
                } else if (item.status === 'nok') {
                    statusIcon = '✗';
                    statusColor = '#dc2626';
                    statusText = 'NÃO OK';
                    bgColor = '#fff1f2';
                    nokCount++;
                } else {
                    naoVerificadoCount++;
                }

                html += `
                    <tr style="background-color: ${bgColor}; page-break-inside: avoid;">
                        <td style="padding: 8px; border: 1px solid #e2e8f0; text-align: center; color: ${statusColor}; font-weight: bold; font-size: 14px;">${statusIcon}</td>
                        <td style="padding: 8px; border: 1px solid #e2e8f0;">
                            <div style="font-weight: 600; color: #1f2937;">${item.id}. ${item.nome}</div>
                            ${item.observacao ? `<div style="color: #64748b; font-size: 10px; margin-top: 3px; font-style: italic;">Obs: ${item.observacao}</div>` : ''}
                        </td>
                        <td style="padding: 8px; border: 1px solid #e2e8f0; text-align: center; color: ${statusColor}; font-weight: bold;">${statusText}</td>
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                </div>

                <!-- RESUMO FINAL -->
                <div style="margin-top: 30px; background-color: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 15px; page-break-inside: avoid;">
                    <h4 style="color: #1e3a8a; margin: 0 0 10px 0; font-size: 14px; text-transform: uppercase;">Resumo da Verificação</h4>
                    <table style="width: 100%; font-size: 12px; border-collapse: collapse;">
                        <tr>
                            <td style="padding: 5px;"><strong>✅ Itens OK:</strong> ${okCount}</td>
                            <td style="padding: 5px;"><strong>❌ Itens NÃO OK:</strong> ${nokCount}</td>
                            <td style="padding: 5px;"><strong>⚪ Não Verificados:</strong> ${naoVerificadoCount}</td>
                            <td style="padding: 5px; text-align: right;"><strong>TOTAL:</strong> 36 Itens</td>
                        </tr>
                    </table>
                </div>
            `;

            // OBSERVAÇÕES E PEDIDOS
            if (observacoes || pedidos) {
                html += `<div style="margin-top: 25px;">`;
                if (observacoes) {
                    html += `
                        <div style="padding: 15px; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 15px; page-break-inside: avoid;">
                            <h4 style="color: #475569; margin: 0 0 8px 0; font-size: 13px; text-transform: uppercase; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px;">Observações Gerais</h4>
                            <p style="margin: 0; font-size: 12px; color: #1f2937; white-space: pre-wrap; line-height: 1.6;">${observacoes}</p>
                        </div>
                    `;
                }
                if (pedidos) {
                    html += `
                        <div style="padding: 15px; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; page-break-inside: avoid;">
                            <h4 style="color: #475569; margin: 0 0 8px 0; font-size: 13px; text-transform: uppercase; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px;">Pedidos / Solicitações</h4>
                            <p style="margin: 0; font-size: 12px; color: #1f2937; white-space: pre-wrap; line-height: 1.6;">${pedidos}</p>
                        </div>
                    `;
                }
                html += `</div>`;
            }

            // ASSINATURAS - SEMPRE AO FINAL
            html += `
                <div style="margin-top: 50px; padding-top: 20px; text-align: center; page-break-inside: avoid;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 30px; padding: 0 40px;">
                        <div style="width: 250px;">
                            <div style="border-top: 1.5px solid #475569; padding-top: 8px; font-size: 11px; color: #475569; font-weight: 600;">Assinatura do Operador</div>
                            <div style="font-size: 9px; color: #94a3b8; margin-top: 4px;">${operador}</div>
                        </div>
                        <div style="width: 250px;">
                            <div style="border-top: 1.5px solid #475569; padding-top: 8px; font-size: 11px; color: #475569; font-weight: 600;">Assinatura do Supervisor</div>
                            <div style="font-size: 9px; color: #94a3b8; margin-top: 4px;">Fiscalização Técnica</div>
                        </div>
                    </div>
                    <div style="background-color: #f1f5f9; padding: 10px; border-radius: 5px; display: inline-block;">
                        <p style="color: #64748b; font-size: 10px; margin: 0; font-weight: 500;">Relatório gerado eletronicamente em ${new Date().toLocaleString('pt-BR')}</p>
                    </div>
                </div>
            </div>`;
            return html;
        }

        function downloadPDF() {
            const data = document.getElementById('data').value || 'checklist';
            const element = document.createElement('div');
            element.innerHTML = generatePDFContent();
            
            // CONFIGURAÇÕES PARA MÚLTIPLAS PÁGINAS
            const opt = {
                margin: [15, 15, 15, 15], // Margens: topo, esquerda, baixo, direita
                filename: `checklist-carregadeiras-${data}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { 
                    scale: 2, 
                    useCORS: true,
                    letterRendering: true,
                    logging: false
                },
                jsPDF: { 
                    orientation: 'portrait', 
                    unit: 'mm', 
                    format: 'a4',
                    putOnlyUsedFonts: true
                },
                pagebreak: { 
                    mode: ['avoid-all', 'css', 'legacy'],
                    before: '.page-break-before',
                    avoid: 'tr, .falha-item, .card'
                }
            };

            showToast('Gerando PDF com múltiplas páginas...');
            
            html2pdf().set(opt).from(element).save().then(() => {
                showToast('PDF Gerado com Sucesso!');
            }).catch(err => {
                console.error('Erro ao gerar PDF:', err);
                showToast('Erro ao gerar PDF. Tente novamente.');
            });
        }

        function sendPDFWhatsApp() {
            downloadPDF();
            const report = generateWhatsAppReport();
            const encodedReport = encodeURIComponent(report);
            setTimeout(() => {
                window.open(`https://wa.me/?text=${encodedReport}`, '_blank');
            }, 2000);
        }
    </script>
