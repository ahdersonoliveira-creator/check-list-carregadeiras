<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">
    <title>Checklist de Carregadeiras</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-family: 'Inter', sans-serif;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
        }

        body {
            background: linear-gradient(to bottom right, #f0f9ff, #e0e7ff);
            color: #1f2937;
            line-height: 1.6;
        }

        .container {
            max-width: 56rem;
            margin: 0 auto;
            padding: 1rem;
        }

        @media (min-width: 768px) {
            .container {
                padding: 1.5rem;
            }
        }

        @media (min-width: 1024px) {
            .container {
                padding: 2rem;
            }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header-icon {
            width: 3rem;
            height: 3rem;
            background: linear-gradient(to bottom right, #2563eb, #4f46e5);
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 1rem;
        }

        .header h1 {
            font-size: 1.875rem;
            margin-bottom: 0.5rem;
            color: #111827;
        }

        @media (min-width: 768px) {
            .header h1 {
                font-size: 2.25rem;
            }
        }

        .header p {
            color: #4b5563;
        }

        /* Tabs */
        .tabs {
            margin-bottom: 1.5rem;
        }

        .tab-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        @media (min-width: 640px) {
            .tab-list {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .tab-button {
            padding: 0.75rem 1rem;
            border: none;
            background: white;
            color: #6b7280;
            font-weight: 500;
            cursor: pointer;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
            font-size: 0.875rem;
        }

        .tab-button:hover {
            background: #f3f4f6;
        }

        .tab-button.active {
            background: linear-gradient(to right, #2563eb, #4f46e5);
            color: white;
        }

        /* Card */
        .card {
            background: white;
            border-radius: 0.65rem;
            border: 1px solid #e5e7eb;
            overflow: hidden;
        }

        .card-header {
            padding: 1.5rem;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h2 {
            font-size: 1.125rem;
            color: #111827;
        }

        .card-content {
            padding: 1.5rem;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 1rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        @media (min-width: 768px) {
            .form-row {
                grid-template-columns: 1fr 1fr;
            }
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #374151;
            font-size: 0.875rem;
        }

        input[type="text"],
        input[type="date"],
        input[type="time"],
        textarea,
        select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        input[type="time"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Buttons */
        .button {
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-height: 44px; /* Touch target size */
        }

        .button-primary {
            background: linear-gradient(to right, #2563eb, #4f46e5);
            color: white;
        }

        .button-primary:hover {
            opacity: 0.9;
        }

        .button-outline {
            background: white;
            color: #374151;
            border: 1px solid #d1d5db;
        }

        .button-outline:hover {
            background: #f9fafb;
        }

        .button-danger {
            background: white;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .button-danger:hover {
            background: #fef2f2;
        }

        .button-success {
            background: #16a34a;
            color: white;
        }

        .button-success:hover {
            opacity: 0.9;
        }

        .button-full {
            width: 100%;
        }

        /* Falhas */
        .falha-item {
            padding: 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            transition: background-color 0.3s ease;
        }

        .falha-item:hover {
            background-color: #f9fafb;
        }

        .falha-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .falha-header h3 {
            font-size: 1rem;
            color: #111827;
        }

        /* Checklist */
        .checklist-container {
            max-height: 24rem;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .checklist-item {
            padding: 0.75rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            transition: background-color 0.3s ease;
        }

        .checklist-item:hover {
            background-color: #f9fafb;
        }

        .checklist-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .checklist-item-label {
            font-weight: 500;
            font-size: 0.875rem;
            flex: 1;
            min-width: 200px;
        }

        .checklist-item-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .checklist-item-buttons button {
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            min-width: 100px;
        }

        /* Resumo */
        .summary-box {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .summary-box h3 {
            color: #1e3a8a;
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        .summary-box ul {
            list-style: none;
            color: #1e40af;
            font-size: 0.875rem;
        }

        .summary-box li {
            margin-bottom: 0.25rem;
        }

        /* Button Grid */
        .button-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        @media (min-width: 768px) {
            .button-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Tab Content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Scrollbar */
        .checklist-container::-webkit-scrollbar {
            width: 0.5rem;
        }

        .checklist-container::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 0.25rem;
        }

        .checklist-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 0.25rem;
        }

        .checklist-container::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Mobile optimizations */
        @media (max-width: 640px) {
            body {
                -webkit-user-select: none;
                user-select: none;
            }

            input, textarea, select {
                -webkit-user-select: text;
                user-select: text;
                font-size: 16px; /* Prevents zoom on iOS */
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .container {
                padding: 0.75rem;
            }

            .card-header {
                padding: 1rem;
            }

            .card-content {
                padding: 1rem;
            }
        }

        /* Prevent double-tap zoom on buttons */
        button {
            touch-action: manipulation;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            background: white;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        .toast.success {
            border-left: 4px solid #16a34a;
            color: #15803d;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }

        /* Mobile toast positioning */
        @media (max-width: 640px) {
            .toast {
                bottom: 1rem;
                right: 0.5rem;
                left: 0.5rem;
                width: auto;
            }
        }

        .toast.hide {
            animation: slideOut 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-icon">🚜</div>
            <h1>Checklist de Carregadeiras</h1>
            <p>Preencha o formulário abaixo e envie pelo WhatsApp</p>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab-list">
                <button class="tab-button active" onclick="switchTab(event, 'dados')">Dados</button>
                <button class="tab-button" onclick="switchTab(event, 'falhas')">Falhas</button>
                <button class="tab-button" onclick="switchTab(event, 'checklist')">Checklist</button>
                <button class="tab-button" onclick="switchTab(event, 'resumo')">Resumo</button>
            </div>

            <!-- TAB: DADOS BÁSICOS -->
            <div id="dados" class="tab-content active">
                <div class="card">
                    <div class="card-header">
                        <h2>Dados Básicos</h2>
                    </div>
                    <div class="card-content">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="data">Data</label>
                                <input type="date" id="data">
                            </div>
                            <div class="form-group">
                                <label for="turno">Turno</label>
                                <input type="text" id="turno" placeholder="Ex: Manhã, Tarde, Noite">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="operador">Operador</label>
                            <input type="text" id="operador" placeholder="Nome do operador">
                        </div>

                        <div class="form-group">
                            <label for="maquina">Máquina</label>
                            <input type="text" id="maquina" placeholder="Modelo/Número da máquina">
                        </div>

                        <div class="form-group">
                            <label for="local">Local</label>
                            <input type="text" id="local" placeholder="Local de operação">
                        </div>
                    </div>
                </div>
            </div>

            <!-- TAB: FALHAS -->
            <div id="falhas" class="tab-content">
                <div id="falhas-container"></div>
                <button class="button button-outline button-full" onclick="addFalha()">+ Adicionar Falha</button>
            </div>

            <!-- TAB: CHECKLIST -->
            <div id="checklist" class="tab-content">
                <div class="card">
                    <div class="card-header">
                        <h2>Checklist de Verificação (35 Itens)</h2>
                    </div>
                    <div class="card-content">
                        <div class="checklist-container" id="checklist-container"></div>
                    </div>
                </div>
            </div>

            <!-- TAB: RESUMO -->
            <div id="resumo" class="tab-content">
                <div class="card">
                    <div class="card-header">
                        <h2>Observações e Pedidos</h2>
                    </div>
                    <div class="card-content">
                        <div class="form-group">
                            <label for="observacoes">Observações</label>
                            <textarea id="observacoes" placeholder="Adicione observações gerais..."></textarea>
                        </div>

                        <div class="form-group">
                            <label for="pedidos">Pedidos</label>
                            <textarea id="pedidos" placeholder="Liste os pedidos/solicitações..."></textarea>
                        </div>

                        <div class="summary-box">
                            <h3>Resumo do Preenchimento</h3>
                            <ul>
                                <li>✓ Dados básicos: <span id="summary-dados">Incompleto</span></li>
                                <li>✓ Falhas registradas: <span id="summary-falhas">0</span></li>
                                <li>✓ Itens verificados: <span id="summary-checklist">0</span>/35</li>
                            </ul>
                        </div>

                        <div class="button-grid">
                            <button class="button button-outline button-full" onclick="copyReport()">📋 Copiar</button>
                            <button class="button button-outline button-full" onclick="downloadReport()">⬇️ Baixar</button>
                            <button class="button button-success button-full" onclick="sendWhatsApp()">📱 WhatsApp</button>
                        </div>

                        <div class="button-grid" style="margin-top: 1rem;">
                            <button class="button button-outline button-full" onclick="downloadPDF()">📄 Baixar PDF</button>
                            <button class="button button-success button-full" style="grid-column: span 2;" onclick="sendPDFWhatsApp()">📱 Enviar PDF WhatsApp</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CHECKLIST_ITEMS = [
            "Nível do óleo",
            "Limpeza do filtro de ar do motor",
            "Estado das correias do alternador A/C",
            "Nível do líquido de arrefecedor",
            "Filtro separador de combustível",
            "Limpeza dos radiadores",
            "Limpeza do condensador do ar condicionado",
            "Vazamento no motor",
            "Nível do óleo hidráulico",
            "Estado das mangueiras hidráulicas",
            "Estado dos cilindros hidráulicos",
            "Lubrificação dos pinos de articulação",
            "Lubrificação do cardan",
            "Caçamba - Lâmina - Dentes",
            "Bordas cortantes",
            "Folgas nos pontos de articulação",
            "Vazamento no sistema hidráulico",
            "Limpeza da cabine",
            "Retrovisores",
            "Funcionamento do ar condicionado",
            "Faróis de serviço e sinalização",
            "Falhas ativas no painel",
            "Filtros hidráulicos",
            "Limpador de para-brisa",
            "Cinto de segurança",
            "Filtro de ar condicionado (int. e ext.)",
            "Freio e acelerador",
            "Buzina",
            "Alavancas em gerais",
            "Vidros",
            "Tampas do compartimento do motor",
            "Contra peso",
            "Escadas laterais",
            "Baterias",
            "Alarme de ré"
        ];

        let falhas = [{ horaInicial: "", horaFinal: "", descricao: "" }];
        let checklist = CHECKLIST_ITEMS.map((nome, idx) => ({
            id: idx + 1,
            nome,
            status: null,
            observacao: ""
        }));

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadDataFromStorage();
            renderFalhas();
            renderChecklist();
            updateSummary();
            document.addEventListener('change', saveDataToStorage);
            document.addEventListener('input', saveDataToStorage);
        });

        // LocalStorage functions for data persistence
        function saveDataToStorage() {
            try {
                const data = {
                    data: document.getElementById('data').value,
                    operador: document.getElementById('operador').value,
                    maquina: document.getElementById('maquina').value,
                    turno: document.getElementById('turno').value,
                    local: document.getElementById('local').value,
                    observacoes: document.getElementById('observacoes').value,
                    pedidos: document.getElementById('pedidos').value,
                    falhas: falhas,
                    checklist: checklist
                };
                localStorage.setItem('checklistData', JSON.stringify(data));
            } catch (e) {
                console.log('Erro ao salvar dados:', e);
            }
        }

        function loadDataFromStorage() {
            try {
                const saved = localStorage.getItem('checklistData');
                if (saved) {
                    const data = JSON.parse(saved);
                    if (data.data) document.getElementById('data').value = data.data;
                    if (data.operador) document.getElementById('operador').value = data.operador;
                    if (data.maquina) document.getElementById('maquina').value = data.maquina;
                    if (data.turno) document.getElementById('turno').value = data.turno;
                    if (data.local) document.getElementById('local').value = data.local;
                    if (data.observacoes) document.getElementById('observacoes').value = data.observacoes;
                    if (data.pedidos) document.getElementById('pedidos').value = data.pedidos;
                    if (data.falhas) falhas = data.falhas;
                    if (data.checklist) checklist = data.checklist;
                }
            } catch (e) {
                console.log('Erro ao carregar dados:', e);
            }
        }

        // Tab switching
        function switchTab(event, tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            
            // Handle both direct event and manual calls
            const target = event.currentTarget || event.target;
            if (target) target.classList.add('active');
            
            updateSummary();
        }

        // Falhas
        function renderFalhas() {
            const container = document.getElementById('falhas-container');
            container.innerHTML = falhas.map((falha, idx) => `
                <div class="card" style="margin-bottom: 1rem;">
                    <div class="card-header">
                        <h2>Falha ${idx + 1}</h2>
                        ${falhas.length > 1 ? `<button class="button button-danger" onclick="removeFalha(${idx})">Remover</button>` : ''}
                    </div>
                    <div class="card-content">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Hora Inicial</label>
                                <input type="time" value="${falha.horaInicial}" onchange="updateFalha(${idx}, 'horaInicial', this.value)">
                            </div>
                            <div class="form-group">
                                <label>Hora Final</label>
                                <input type="time" value="${falha.horaFinal}" onchange="updateFalha(${idx}, 'horaFinal', this.value)">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Descrição da Falha</label>
                            <textarea onchange="updateFalha(${idx}, 'descricao', this.value)">${falha.descricao}</textarea>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function addFalha() {
            falhas.push({ horaInicial: "", horaFinal: "", descricao: "" });
            renderFalhas();
            updateSummary();
        }

        function removeFalha(idx) {
            if (falhas.length > 1) {
                falhas.splice(idx, 1);
                renderFalhas();
                updateSummary();
            }
        }

        function updateFalha(idx, field, value) {
            falhas[idx][field] = value;
            updateSummary();
        }

        // Checklist
        function renderChecklist() {
            const container = document.getElementById('checklist-container');
            container.innerHTML = checklist.map(item => `
                <div class="checklist-item">
                    <div class="checklist-item-header">
                        <div class="checklist-item-label">${item.id}. ${item.nome}</div>
                        <div class="checklist-item-buttons">
                            <button class="button ${item.status === 'ok' ? 'button-primary' : 'button-outline'}" onclick="updateChecklistItem(${item.id}, 'ok')">✅ OK</button>
                            <button class="button ${item.status === 'nok' ? 'button-danger' : 'button-outline'}" onclick="updateChecklistItem(${item.id}, 'nok')">❌ NÃO OK</button>
                        </div>
                    </div>
                    ${item.status ? `
                        <input type="text" placeholder="Observação (opcional)" value="${item.observacao}" onchange="updateChecklistObservacao(${item.id}, this.value)" style="width: 100%; padding: 0.5rem; font-size: 0.875rem;">
                    ` : ''}
                </div>
            `).join('');
        }

        function updateChecklistItem(id, status) {
            const item = checklist.find(i => i.id === id);
            if (item) {
                item.status = item.status === status ? null : status;
                renderChecklist();
                updateSummary();
            }
        }

        function updateChecklistObservacao(id, value) {
            const item = checklist.find(i => i.id === id);
            if (item) {
                item.observacao = value;
            }
        }

        // Summary
        function updateSummary() {
            const data = document.getElementById('data').value;
            const operador = document.getElementById('operador').value;
            const maquina = document.getElementById('maquina').value;

            document.getElementById('summary-dados').textContent = (data && operador && maquina) ? 'Completo' : 'Incompleto';
            document.getElementById('summary-falhas').textContent = falhas.filter(f => f.descricao).length;
            document.getElementById('summary-checklist').textContent = checklist.filter(c => c.status).length;
        }

        // WhatsApp Report Generation
        function generateWhatsAppReport() {
            const data = document.getElementById('data').value || '[Não preenchido]';
            const operador = document.getElementById('operador').value || '[Não preenchido]';
            const maquina = document.getElementById('maquina').value || '[Não preenchido]';
            const turno = document.getElementById('turno').value || '[Não preenchido]';
            const local = document.getElementById('local').value || '[Não preenchido]';
            const observacoes = document.getElementById('observacoes').value;
            const pedidos = document.getElementById('pedidos').value;

            let report = `*📋 RELATÓRIO DE INSPEÇÃO - CARREGADEIRAS*\n`;
            report += `------------------------------------------\n`;
            report += `*🔹 DADOS BÁSICOS*\n`;
            report += `*📅 Data:* ${data}\n`;
            report += `*👤 Operador:* ${operador}\n`;
            report += `*🚜 Máquina:* ${maquina}\n`;
            report += `*🕒 Turno:* ${turno}\n`;
            report += `*📍 Local:* ${local}\n\n`;

            const falhasComDescricao = falhas.filter(f => f.descricao);
            if (falhasComDescricao.length > 0) {
                report += `*⚠️ FALHAS REGISTRADAS*\n`;
                falhasComDescricao.forEach((falha, idx) => {
                    report += `\n*Falha ${idx + 1}:*\n`;
                    report += `  - Horário: ${falha.horaInicial || '?' } às ${falha.horaFinal || '?' }\n`;
                    report += `  - Descrição: ${falha.descricao}\n`;
                });
                report += `\n`;
            }

            report += `*✅ CHECKLIST DE VERIFICAÇÃO*\n`;
            checklist.forEach(item => {
                if (item.status) {
                    const statusIcon = item.status === 'ok' ? '🟢' : '🔴';
                    const statusText = item.status === 'ok' ? 'OK' : 'NÃO OK';
                    report += `${statusIcon} *${item.nome}:* ${statusText}`;
                    if (item.observacao) {
                        report += ` _(Obs: ${item.observacao})_`;
                    }
                    report += `\n`;
                }
            });

            if (observacoes) {
                report += `\n*📝 OBSERVAÇÕES GERAIS*\n${observacoes}\n`;
            }

            if (pedidos) {
                report += `\n*📦 PEDIDOS/SOLICITAÇÕES*\n${pedidos}\n`;
            }

            report += `\n------------------------------------------\n`;
            report += `*📄 O PDF PROFISSIONAL FOI BAIXADO.*\n`;
            report += `*POR FAVOR, ANEXE-O A ESTA CONVERSA.*`;

            return report;
        }

        function copyReport() {
            const report = generateWhatsAppReport().replace(/\*/g, ''); // Remove bold for clipboard
            navigator.clipboard.writeText(report).then(() => {
                showToast('Relatório copiado para a área de transferência!');
            });
        }

        function downloadReport() {
            const report = generateWhatsAppReport().replace(/\*/g, '');
            const data = document.getElementById('data').value || 'checklist';
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(report));
            element.setAttribute('download', `checklist-carregadeiras-${data}.txt`);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
            showToast('Relatório baixado com sucesso!');
        }

        function sendWhatsApp() {
            // Gera o PDF Profissional
            downloadPDF();
            
            // Gera o relatório organizado para o WhatsApp
            const report = generateWhatsAppReport();
            const encodedReport = encodeURIComponent(report);
            
            showToast('Gerando PDF e organizando WhatsApp...');
            
            setTimeout(() => {
                window.open(`https://wa.me/?text=${encodedReport}`, '_blank');
            }, 2000);
        }

        function showToast(message) {
            const existingToasts = document.querySelectorAll(".toast");
            if (existingToasts.length > 0) {
                existingToasts.forEach(t => t.remove());
            }

            const toast = document.createElement('div');
            toast.className = 'toast success';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // PDF Generation Functions
        function generatePDFContent() {
            const data = document.getElementById('data').value || '[Não preenchido]';
            const operador = document.getElementById('operador').value || '[Não preenchido]';
            const maquina = document.getElementById('maquina').value || '[Não preenchido]';
            const turno = document.getElementById('turno').value || '[Não preenchido]';
            const local = document.getElementById('local').value || '[Não preenchido]';
            const observacoes = document.getElementById('observacoes').value;
            const pedidos = document.getElementById('pedidos').value;

            let html = `
                <div style="font-family: Arial, sans-serif; padding: 30px; color: #1f2937; line-height: 1.5; max-width: 800px; margin: auto;">
                    <div style="border-bottom: 3px solid #2563eb; padding-bottom: 15px; margin-bottom: 20px; text-align: center;">
                        <h1 style="color: #2563eb; margin: 0; font-size: 24px;">RELATÓRIO DE CHECKLIST PROFISSIONAL</h1>
                        <p style="color: #6b7280; margin: 5px 0 0 0; font-size: 14px;">Carregadeiras - Inspeção Diária</p>
                    </div>

                    <div style="background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 20px;">
                        <table style="width: 100%; font-size: 12px; border-collapse: collapse;">
                            <tr>
                                <td style="padding: 5px;"><strong>Data:</strong> ${data}</td>
                                <td style="padding: 5px;"><strong>Turno:</strong> ${turno}</td>
                            </tr>
                            <tr>
                                <td style="padding: 5px;"><strong>Operador:</strong> ${operador}</td>
                                <td style="padding: 5px;"><strong>Local:</strong> ${local}</td>
                            </tr>
                            <tr>
                                <td style="padding: 5px;"><strong>Máquina:</strong> ${maquina}</td>
                                <td style="padding: 5px;"></td>
                            </tr>
                        </table>
                    </div>
            `;

            const falhasComDescricao = falhas.filter(f => f.descricao);
            if (falhasComDescricao.length > 0) {
                html += `<div style="margin-bottom: 20px;"><h3 style="color: #dc2626; border-left: 4px solid #dc2626; padding-left: 10px; margin-bottom: 10px; font-size: 16px;">FALHAS REGISTRADAS</h3>`;
                falhasComDescricao.forEach((falha, idx) => {
                    html += `
                        <div style="margin-bottom: 10px; padding: 10px; background-color: #fff1f2; border: 1px solid #fecaca; border-radius: 6px;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                                <strong style="color: #991b1b; font-size: 12px;">Falha ${idx + 1}</strong>
                                <span style="font-size: 10px; color: #b91c1c;">${falha.horaInicial} - ${falha.horaFinal}</span>
                            </div>
                            <p style="margin: 0; color: #1f2937; font-size: 11px;">${falha.descricao}</p>
                        </div>
                    `;
                });
                html += `</div>`;
            }

            html += `
                <div style="margin-bottom: 20px;">
                    <h3 style="color: #2563eb; border-left: 4px solid #2563eb; padding-left: 10px; margin-bottom: 10px; font-size: 16px;">CHECKLIST DE VERIFICAÇÃO</h3>
                    <table style="width: 100%; border-collapse: collapse; font-size: 10px;">
                        <thead>
                            <tr style="background-color: #f1f5f9; border-bottom: 2px solid #cbd5e1;">
                                <th style="padding: 8px; text-align: left; border: 1px solid #e2e8f0; width: 30px;">#</th>
                                <th style="padding: 8px; text-align: left; border: 1px solid #e2e8f0;">Item</th>
                                <th style="padding: 8px; text-align: center; border: 1px solid #e2e8f0; width: 80px;">Status</th>
                                <th style="padding: 8px; text-align: left; border: 1px solid #e2e8f0;">Observações</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            checklist.forEach(item => {
                const status = item.status === 'ok' ? 'OK' : item.status === 'nok' ? 'NÃO OK' : 'N/V';
                const statusColor = item.status === 'ok' ? '#16a34a' : item.status === 'nok' ? '#dc2626' : '#94a3b8';
                const rowBg = item.status === 'nok' ? '#fff1f2' : 'transparent';
                
                html += `
                    <tr style="background-color: ${rowBg};">
                        <td style="padding: 6px; border: 1px solid #e2e8f0; text-align: center;">${item.id}</td>
                        <td style="padding: 6px; border: 1px solid #e2e8f0; font-weight: 500;">${item.nome}</td>
                        <td style="padding: 6px; border: 1px solid #e2e8f0; text-align: center; color: ${statusColor}; font-weight: bold;">${status}</td>
                        <td style="padding: 6px; border: 1px solid #e2e8f0; font-style: italic; color: #64748b;">${item.observacao || '-'}</td>
                    </tr>
                `;
            });

            html += `</tbody></table></div>`;

            if (observacoes || pedidos) {
                html += `<div style="display: table; width: 100%; margin-bottom: 20px; table-layout: fixed;">`;
                html += `<div style="display: table-row;">`;
                if (observacoes) {
                    html += `
                        <div style="display: table-cell; padding: 10px; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; vertical-align: top;">
                            <h4 style="color: #475569; margin: 0 0 5px 0; font-size: 12px; text-transform: uppercase;">Observações Gerais</h4>
                            <p style="margin: 0; font-size: 11px; white-space: pre-wrap;">${observacoes}</p>
                        </div>
                    `;
                }
                if (pedidos) {
                    html += `
                        <div style="display: table-cell; padding: 10px; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; vertical-align: top;">
                            <h4 style="color: #475569; margin: 0 0 5px 0; font-size: 12px; text-transform: uppercase;">Pedidos / Solicitações</h4>
                            <p style="margin: 0; font-size: 11px; white-space: pre-wrap;">${pedidos}</p>
                        </div>
                    `;
                }
                html += `</div></div>`;
            }

            html += `
                <div style="margin-top: 40px; border-top: 1px solid #e2e8f0; padding-top: 20px; text-align: center;">
                    <div style="display: flex; justify-content: space-around; margin-bottom: 20px;">
                        <div style="border-top: 1px solid #475569; width: 200px; padding-top: 5px; font-size: 10px; color: #475569;">Assinatura do Operador</div>
                        <div style="border-top: 1px solid #475569; width: 200px; padding-top: 5px; font-size: 10px; color: #475569;">Assinatura do Supervisor</div>
                    </div>
                    <p style="color: #94a3b8; font-size: 9px; margin: 0;">Relatório gerado em ${new Date().toLocaleString('pt-BR')}</p>
                </div>
            </div>`;

            return html;
        }

        function downloadPDF() {
            const data = document.getElementById('data').value || 'checklist';
            const element = document.createElement('div');
            element.innerHTML = generatePDFContent();
            
            const opt = {
                margin: 10,
                filename: `checklist-carregadeiras-${data}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
            };
            
            html2pdf().set(opt).from(element).save().then(() => {
                showToast('PDF Profissional baixado com sucesso!');
            });
        }

        function sendPDFWhatsApp() {
            downloadPDF();
            const report = generateWhatsAppReport();
            const encodedReport = encodeURIComponent(report);
            setTimeout(() => {
                window.open(`https://wa.me/?text=${encodedReport}`, '_blank');
            }, 2000);
        }

    </script>
</body>
</html>
